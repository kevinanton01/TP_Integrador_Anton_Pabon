<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein AP</title>

    <!-- Importacion de archivo CSS (Estilos) -->
    <link rel="stylesheet" href="./css/post.css">

    <script src="./js/post.js" defer></script>
</head>
<body>
    <header>
        <img onclick="irAInicio()" id="icono-principal" src="../../img/logo.png" alt="Logo Proteina" />

        <nav id="listado-opciones">
            <a href="./admin.html">VER</a>
            <a href="./get.html">CONSULTAR</a>
            <a href="">CREAR</a>
            <a href="./put.html">MODIFICAR</a>
            <a href="./delete.html">ELIMINAR</a>
        </nav>
        <!-- Importacion de archivo JS (Comportamiento) -->
        <div class="nombreUsuario"></div>
    </header>

    <main>
        <form id="formulario">
            <div>
                <label for="nombre" class="label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="input">
            </div>
            <div>
                <label for="imagen" class="label">Imagen</label>
                <input type="text" id="imagen" name="imagen"class="input">
            </div>

           
            <div>
                <label for="categoria" class="label">Categoria</label>
                <select name="categoria" id="categoria" >
                    <option value="proteina" >proteina</option>
                    <option value="creatina">creatina</option>
                    <option value="shaker" >shaker</option>
                </select>
            </div>   
            <div>
                <label for="precio" class="label">Precio</label>
                <input type="text" id="precio" name="precio" class="input">

            </div>
            <div>
                <input type="submit" value="crear producto" id="submit">

            </div>

            
            
        </form>
        <div id="mensaje"></div>
    </main>

    <footer>
        <p>Todos los derechos reservados | Whey Protein AP</p>
        <p>Alumnos: Antón kevin - Gabriel Pabon</p>
    </footer>

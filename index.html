<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein AP</title>

    <!-- Importacion de archivo CSS (Estilos) -->
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <header>
        <img id="icono-principal" src="./img/logo.png" alt="Logo Proteina" />

        <nav id="listado-opciones">
            <a href="">Inicio</a>
            <a href="">Proteinas</a>
            <a href="">Creatinas</a>
            <a href="">Shackers</a>
        </nav>

        <div class="nombreAlumno">Kevin Antón | Gabriel Pabon</div>
    </header>

    <main>
        <div id="registro-usuario">
            
            <p>BIENVENIDO</p>
            <label for="nombre">Ingrese su nombre</label>       
            <input type="text" name="nombre" id="nombre" placeholder="Nombre de usuario">
            <button class="btn-ingresar" onclick="ingresar()">Ingresar</button>

            <hr>
            
            <button onclick="mostrarLoginAdmin()">Ingresar como administrador</button>
            
            <div id="loginAdmin" style="display: none;">
                <h2>Ingrese sus datos</h2>

                <input type="text" id="usuarioAdmin" placeholder="Email">
                <input type="password" id="passwordAdmin" placeholder="Contraseña">

                <button onclick="validarAdmin()">Ingresar</button>
                <button onclick="cerrarLoginAdmin()">Cancelar</button>
            </div>

        </div>
    </main>

    <!-- Importacion de archivo JS (Comportamiento) -->
    <script src="./index.js"></script>
</body>
</html>
